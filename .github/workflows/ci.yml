name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (core + dev extras)
        run: |
          python -m pip install --upgrade pip
          # NOTE: external clusterer backends (tcrdist3, gliph2, giana,
          # tcrmatch, deeptcr) are not pure-PyPI installs, so we install
          # only [dev] here. Their wrapper tests self-skip via
          # pytest.importorskip; only the in-tree clusterer (hd_baseline)
          # and the core consensus/io/schema/eval/refine logic run on CI.
          pip install -e ".[dev]"

      - name: Byte-compile (syntax check)
        run: python -m compileall -q src

      - name: Run tests
        run: pytest -q
